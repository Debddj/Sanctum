<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sanctum — AR VFX Engine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0a0a0f; }
        #webcam {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 1;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
        }
        #overlay {
            position: fixed;
            top: 16px;
            left: 16px;
            color: #00ffff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
            background: rgba(10, 10, 15, 0.80);
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.25);
            backdrop-filter: blur(4px);
        }
        #gesture-banner {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff6600;
            font-family: 'Courier New', monospace;
            font-size: 22px;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
            background: rgba(10, 10, 15, 0.80);
            padding: 12px 24px;
            border-radius: 10px;
            border: 2px solid rgba(255, 102, 0, 0.5);
            box-shadow: 0 0 20px rgba(255, 102, 0, 0.3);
            display: none;
        }
    </style>
</head>
<body>
    <!-- Live camera feed background -->
    <img id="webcam" alt="Camera Feed" />

    <!-- Top-left HUD -->
    <div id="overlay">
        <div id="fps">FPS: --</div>
        <div id="status">Status: connecting...</div>
        <div id="hands">Hands: 0</div>
    </div>

    <!-- Bottom gesture detection banner -->
    <div id="gesture-banner"></div>

    <script type="module" src="/src/App.jsx"></script>
</body>
</html>
