<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sanctum — AR VFX Engine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0a0a0f; }
        #webcam {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
            pointer-events: none;
        }
        #overlay {
            position: fixed;
            top: 16px;
            left: 16px;
            color: #00ffff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
            background: rgba(10, 10, 15, 0.75);
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.25);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>
    <!-- Live camera feed background image -->
    <img id="webcam" alt="Camera Feed" />

    <!-- Overlay telemetry -->
    <div id="overlay">
        <div id="fps">FPS: --</div>
        <div id="status">Status: connecting...</div>
    </div>

    <script type="module" src="/src/App.jsx"></script>
</body>
</html>
